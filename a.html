<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }
        
        body {
            background-color: #fae1e1;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .container {
            width: 1000px;
            margin: 0 auto;
            box-sizing: border-box;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            align-items: center;
            padding: 1.2rem;
            color: black;
        }

        header>p img {
            width: 50%; 
            position: relative; 
            top: 10px; 
            left: 20px;
        }

        header>ul {
            display: flex;
            font-size: 20px;
            gap: 20px;
            align-items: center;
        }

        li:link a {
            color: #000000;
            text-decoration: none;
        }

        li:hover a {
            color: #ff0000;
            font-weight: bold;
        }

        li:active a {
            color: #4e0000;
        }

        header>ul>li {
            list-style-type: none;
            margin-left: 1.7rem;
        }

        header>ul>li>a {
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 800;
        }

        table, tr, td, th {
            border: none;
            padding: 10px;
            text-align: center;
            margin: 50px;
            font-weight: bold;
        }

        .jelly {
            border: 1px solid gray;
            border-radius: 10px;
            background-color: rgb(255, 207, 207);
            margin-top: 20px;
        }

        .text {
            border: none;
            width: 500px;
            font-size: 16px;
            margin: 40px;
            margin-left: 50px;
            font-family: sans-serif;
        }

        .highlight {
            font-size: 16px;
            font-weight: bold;
        }

        .highlight-1 {
        font-size: 40px;
        font-weight: bold;
        font-family: 'Noto Sans KR', sans-serif;
        }

    </style>
</head>
