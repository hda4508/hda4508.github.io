<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>My Page</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }
        @import url('https://fonts.googleapis.com/css2?family=Jost:wght@100;300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@100;300;400;500;600;700;800;900&family=Noto+Sans:wght@100;300;400;500;600;700;800;900&family=Playfair+Display:wght@400;700;900&display=swap');
        
        body {
            background-color: #fae1e1;
            font-family: 'Noto Sans', sans-serif; 
        }

        .container {
            width: 1000px;
            margin: 0 auto;
            box-sizing: border-box;
            height: auto; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            align-items: center;
            padding: 1.2rem;
            color: black;
        }

        header > p img {
            width: 80px; 
        }

        header > ul {
            display: flex;
            font-size: 20px;
            gap: 20px;
            align-items: center;
        }

        header > ul > li {
            list-style-type: none;
            margin-left: 1.7rem;
        }

        header > ul > li > a {
            color: #000000;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 800;
        }

        header > ul > li > a:hover {
            color: #ff0000;
            font-weight: bold;
        }

        section {
            margin-top: 20px; 
        }

        section img {
            width: 900px; 
        }

        footer {
            display: flex;
            flex-direction: column; 
            align-items: center;
            gap: 5px; 
            margin-top: 20px;
            color: gray;
            font-size: 14px;
            text-align: center; 
        }

        h6 {
            margin: 0;
            color: gray;
            font-size: 10px;
        }

    </style>
</head>
