<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }
        .container {
            width: 1000px;
            margin: 0 auto;
            box-sizing: border-box;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            align-items: center;
            padding: 1.2rem;
            color: black;
        }

        header>p img {
            width: 50%; 
            position: relative; 
            top: 10px; 
            left: 20px;
        }

        header>ul {
            display: flex;
            font-size: 20px;
            gap: 20px;
            align-items: center;
        }

        li:link a {
            color: #000000;
            text-decoration: none;
        }
    
        li:hover a {
            color: #ff0000;
            font-weight: bold;
        }
        li:active a {
            color: #4e0000;
        }

        header>ul>li {
            list-style-type: none;
            margin-left: 1.7rem;
        }

        header>ul>li>a {
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 800;
        }
        body {
            background-color: #fae1e1;
        }
        table {
            width: 100%; 
            height: 700px;
            border-collapse: separate; 
            border-spacing:40px; 
            margin: 0;
        }

        td {
            border: none; 
            padding: 10px; 
            text-align: center; 
            width: 200px; 
            height: 200px; 
            vertical-align: top; 
        }

        .jelly {
            border: 1px solid gray;
            border-radius: 10px;
            background-color: rgb(255, 207, 207);
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }
        .jelly img {
            width: 200px; 
            height: auto; 
            max-height: 250px;
        }

        .highlight {
            font-size: 20px; 
            font-weight: bold; 
            margin-top: 10px; 
        }

        .text {
            border: none;
            align-content: center;
            width: 500px;
            font-size: 16px;
            margin: 40px;
            margin-left: 50px;
            font-family: sans-serif;
        }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <p>
                <a href="index.html"><img src="img/Asset 1.png" width="10px"></a>
            </p>
            <ul>
                <li>
                    <a href="a.html">bärchen pärchen</a>
                </li>
                <li>
                    <a href="b.html">Charakter</a>
                </li>
                <li>
                    <a href="c.html">Die Art</a>
                </li>
                <li>
                    <a href="d.html">Mischung</a>
                </li>
                <li>
                    <a href="e.html">Geschmack</a>
                </li>
            </ul>
        </header>
        
        <table>
            <tr>
                <td>
                    <div class="jelly">
                        <a href="b-a.html"><img src="img/apple.png"></a>
                    </div>
                    <span class="highlight">apple</span>
                </td>
                <td>
                    <div class="jelly">
                        <a href="b-b.html"><img src="img/ora.png"></a>
                    </div>
                    <span class="highlight">orange</span>
                </td>
                <td>
                    <div class="jelly">
                        <a href="b-c.html"><img src="img/lemon.png"></a>
                    </div>
                    <span class="highlight">lemon</span>
                </td>
            </tr>
            <tr>
                <td>
                    <div class="jelly">
                        <a href="b-d.html"><img src="img/bbb.png"></a>
                    </div>
                    <span class="highlight">blackcurrant</span>
                </td>
                <td>
                    <div class="jelly">
                        <a href="b-e.html"><img src="img/blue.png"></a>
                    </div>
                    <span class="highlight">blueberry</span>
                </td>
                <td>
                    <div class="jelly">
                        <a href="b-f.html"><img src="img/cc.png"></a>
                    </div>
                    <span class="highlight">cherry</span>
                </td>
            </tr>
        </table>    
    </div>
</body>
</html>
